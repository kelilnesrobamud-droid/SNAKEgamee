<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ከሊል አፕ - Snake Game</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; background: #000; color: #00ffcc; 
            font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; overflow: hidden;
            position: fixed; width: 100%;
        }
        
        /* ማስታወቂያ */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #111, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 20px;
        }
        .splash-content {
            border: 2px solid #00ffcc; padding: 30px; border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        .header { 
            width: 100%; height: 50px; display: flex; justify-content: space-between; 
            align-items: center; background: #111; border-bottom: 2px solid #00ff00; 
            padding: 0 15px; z-index: 10;
        }
        .stat { font-size: 14px; font-weight: bold; color: #fff; }
        
        #game-board { 
            position: relative; flex: 1; width: 100%;
            display: flex; align-items: center; justify-content: center;
            padding: 10px; background: #000;
        }

        /* እባቡን የሚገድለው መስመር - ደመቅ ያለ አረንጓዴ ተደርጓል */
        canvas { 
            background: #000; 
            border: 4px solid #00ff00; 
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        }

        .pad-container {
            width: 100%; max-width: 250px;
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 12px; padding: 10px; 
            margin-bottom: 70px; /* ለስልኩ በተኖች ክፍተት */
        }
        .touch-btn {
            background: rgba(0, 255, 0, 0.1); border: 2px solid #00ff00;
            border-radius: 50%; height: 60px; width: 60px; display: flex; 
            align-items: center; justify-content: center;
            font-size: 24px; color: #00ff00; user-select: none; margin: auto;
        }
        .touch-btn:active { background: #00ff00; color: #000; }
        .pause-btn { border-color: #ffcc00; color: #ffcc00; border-radius: 15px; width: 100%; }

        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        button.main-btn {
            padding: 12px 35px; font-size: 18px; background: #00ff00;
            border: none; border-radius: 25px; font-weight: bold; color: #000;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <h2 style="color:#00ff00;">ከሊል አፕ</h2>
            <p style="color:#fff;">አፕሊኬሽን ወይም ዌብሳይት ለማሰራት ፍላጎት ካለዎት ትክክለኛው መፍትሄ እኛ ጋር አለ!</p>
            <h2 style="color:#ffcc00;">0927713359</h2>
        </div>
    </div>

    <div class="header">
        <div class="stat">ውጤት: <span id="score">0</span></div>
        <select id="difficulty" style="background:#00ff00; border-radius:5px; font-weight:bold; border:none; padding:2px 5px;">
            <option value="150">ቀላል</option>
            <option value="100" selected>መካከለኛ</option>
            <option value="65">ፈጣን</option>
        </select>
        <div class="stat">ከፍተኛ: <span id="high-score-top">0</span></div>
    </div>

    <div id="game-board">
        <canvas id="snakeCanvas"></canvas>
        <div id="menu" style="display:none;">
            <h2 id="menu-title" style="color:#00ff00; text-align:center;">ከሊል እባብ</h2>
            <button class="main-btn" id="start-btn">ጀምር</button>
        </div>
    </div>

    <div class="pad-container">
        <div></div><div class="touch-btn" id="btn-up">▲</div><div></div>
        <div class="touch-btn" id="btn-left">◀</div>
        <div class="touch-btn pause-btn" id="btn-pause">⏸</div>
        <div class="touch-btn" id="btn-right">▶</div>
        <div></div><div class="touch-btn" id="btn-down">▼</div><div></div>
    </div>

<script>
    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("score");
    const menu = document.getElementById("menu");
    const splash = document.getElementById("splash-screen");
    const grid = 20;

    setTimeout(() => {
        splash.style.display = "none";
        menu.style.display = "flex";
    }, 3000);

    function resizeCanvas() {
        const board = document.getElementById("game-board");
        let w = Math.floor((board.clientWidth - 20) / grid) * grid;
        let h = Math.floor((board.clientHeight - 20) / grid) * grid;
        canvas.width = w;
        canvas.height = h;
    }
    
    window.onload = resizeCanvas;
    window.onresize = resizeCanvas;

    let snake, food, dx, dy, score, interval, isPaused = false;

    function startGame() {
        resizeCanvas();
        menu.style.display = "none";
        score = 0; scoreText.innerText = score;
        dx = grid; dy = 0; isPaused = false;
        
        let startX = Math.floor((canvas.width / grid) / 2) * grid;
        let startY = Math.floor((canvas.height / grid) / 2) * grid;
        snake = [{x: startX, y: startY}, {x: startX - grid, y: startY}];
        
        createFood();
        if(interval) clearInterval(interval);
        interval = setInterval(main, parseInt(document.getElementById("difficulty").value));
    }

    function createFood() {
        food = {
            x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
            y: Math.floor(Math.random() * (canvas.height / grid)) * grid
        };
        if(snake.some(p => p.x === food.x && p.y === food.y)) createFood();
    }

    function main() {
        if (isPaused) return;
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};

        if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || 
            snake.some(p => p.x === head.x && p.y === head.y)) {
            gameOver(); return;
        }

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score += 10; scoreText.innerText = score;
            createFood();
        } else {
            snake.pop();
        }
        draw();
    }

    function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // ዳራ ጽሁፍ
        ctx.fillStyle = "rgba(0, 255, 0, 0.08)";
        ctx.font = "bold 40px Arial";
        ctx.textAlign = "center";
        ctx.fillText("KHALIL", canvas.width/2, canvas.height/2 + 15);

        // ምግብ
        ctx.fillStyle = "#ff0055";
        ctx.fillRect(food.x + 2, food.y + 2, grid - 4, grid - 4);

        // እባብ
        snake.forEach((p, i) => {
            ctx.fillStyle = (i === 0) ? "#00ff00" : "#006600";
            ctx.fillRect(p.x + 1, p.y + 1, grid - 2, grid - 2);
        });
    }

    function setDir(d) {
        if (d === 'U' && dy === 0) { dx = 0; dy = -grid; }
        if (d === 'D' && dy === 0) { dx = 0; dy = grid; }
        if (d === 'L' && dx === 0) { dx = -grid; dy = 0; }
        if (d === 'R' && dx === 0) { dx = grid; dy = 0; }
    }

    document.getElementById("start-btn").onclick = startGame;
    
    const handleDir = (id, dir) => {
        document.getElementById(id).addEventListener('touchstart', (e) => {
            e.preventDefault(); setDir(dir);
        }, {passive: false});
        document.getElementById(id).onclick = () => setDir(dir);
    };

    handleDir('btn-up', 'U'); handleDir('btn-down', 'D');
    handleDir('btn-left', 'L'); handleDir('btn-right', 'R');
    
    document.getElementById('btn-pause').onclick = () => { isPaused = !isPaused; };

    function gameOver() {
        clearInterval(interval);
        let high = localStorage.getItem("khalilHigh") || 0;
        if(score > high) localStorage.setItem("khalilHigh", score);
        document.getElementById("high-score-top").innerText = localStorage.getItem("khalilHigh");
        document.getElementById("menu-title").innerHTML = "GAME OVER!<br>ውጤት: " + score;
        menu.style.display = "flex";
    }

    document.getElementById("high-score-top").innerText = localStorage.getItem("khalilHigh") || 0;
</script>
</body>
</html>
