<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZIDAN SNAKE - COMPLETE</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; background: #000; color: #00ffcc; 
            font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; overflow: hidden;
            position: fixed; width: 100%;
        }
        
        /* ራስጌ - ሁሉም መቆጣጠሪያዎች እዚህ አሉ */
        .header { 
            width: 100%; height: 60px; display: flex; justify-content: space-between; 
            align-items: center; background: #111; border-bottom: 2px solid #00ffcc; 
            padding: 0 10px;
        }
        .stat-group { display: flex; flex-direction: column; gap: 2px; }
        .stat { font-size: 13px; font-weight: bold; color: #fff; }
        
        select { background: #00ffcc; border: none; border-radius: 5px; font-weight: bold; padding: 5px; cursor: pointer; }
        .top-btn { background: #444; color: #ffcc00; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; border: 1px solid #ffcc00; }

        #game-board { 
            position: relative; border: 2px solid #222; 
            background: #050505; margin: 5px auto;
            flex: 1; width: 96%; display: flex; align-items: center; justify-content: center;
        }
        canvas { background: #000; display: block; }

        /* መቆጣጠሪያ ፓድ */
        .pad-container {
            height: 190px; width: 100%; max-width: 280px;
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 10px; padding: 10px; margin-bottom: 15px;
        }
        .touch-btn {
            background: rgba(0, 255, 204, 0.1); border: 2px solid #00ffcc;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #00ffcc; user-select: none;
        }
        .touch-btn:active { background: rgba(0, 255, 204, 0.4); transform: scale(0.95); }
        .pause-btn { border-color: #ffcc00; color: #ffcc00; font-size: 20px; }

        #menu, #high-scores-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        button.main-btn {
            padding: 15px 40px; font-size: 20px; background: #00ffcc;
            border: none; border-radius: 30px; font-weight: bold; cursor: pointer; color: #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat-group">
            <div class="stat">ውጤት: <span id="score">0</span></div>
            <div class="stat">ከፍተኛ: <span id="high-score-top">0</span></div>
        </div>
        
        <select id="difficulty">
            <option value="180">ቀላል</option>
            <option value="110" selected>መካከለኛ</option>
            <option value="70">ፈጣን</option>
        </select>

        <div class="top-btn" onclick="showHighScores()">ደረጃዎች</div>
        <div id="muteBtn" onclick="toggleMute()" style="cursor:pointer; font-size:20px;">🔊</div>
    </div>

    <div id="game-board">
        <canvas id="snakeCanvas"></canvas>
        <div id="menu">
            <h1 id="menu-title" style="color:#00ffcc; margin-bottom:20px; text-align:center;">ዚዳን እባብ</h1>
            <button class="main-btn" id="start-btn">ጀምር</button>
        </div>
        <div id="high-scores-screen" style="display:none;">
            <h2 style="color:#ffcc00;">ምርጥ 5 ውጤቶች</h2>
            <ul id="score-list-items" style="color: white; list-style: none; padding: 0; font-size: 18px; line-height:2.2; text-align:center;"></ul>
            <button class="main-btn" onclick="closeHighScores()" style="padding:10px 30px; margin-top:10px;">ተመለስ</button>
        </div>
    </div>

    <div class="pad-container">
        <div></div><div class="touch-btn" id="btn-up">▲</div><div></div>
        <div class="touch-btn" id="btn-left">◀</div>
        <div class="touch-btn pause-btn" id="btn-pause">⏸</div>
        <div class="touch-btn" id="btn-right">▶</div>
        <div></div><div class="touch-btn" id="btn-down">▼</div><div></div>
    </div>

<script>
    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("score");
    const menu = document.getElementById("menu");
    const startBtn = document.getElementById("start-btn");

    const grid = 20;

    function resizeCanvas() {
        const board = document.getElementById("game-board");
        let w = board.clientWidth - 4;
        let h = board.clientHeight - 4;
        canvas.width = Math.floor(w / grid) * grid;
        canvas.height = Math.floor(h / grid) * grid;
    }
    
    window.onload = resizeCanvas;
    window.onresize = resizeCanvas;

    let snake, food, bonusFood, dx, dy, score, interval, isPaused = false, isMuted = false, foodCount = 0;
    let bonusTimer = null;

    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById("muteBtn").innerText = isMuted ? "🔇" : "🔊";
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playFutSound() {
        if (isMuted) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        osc.start(); osc.stop(audioCtx.currentTime + 0.08);
    }

    function startGame() {
        resizeCanvas();
        menu.style.display = "none";
        score = 0; foodCount = 0; scoreText.innerText = score;
        dx = grid; dy = 0; isPaused = false; bonusFood = null;
        let startX = Math.floor((canvas.width / grid) / 2) * grid;
        let startY = Math.floor((canvas.height / grid) / 2) * grid;
        snake = [{x: startX, y: startY}, {x: startX - grid, y: startY}];
        createFood();
        runGame();
    }

    function runGame() {
        if(interval) clearInterval(interval);
        interval = setInterval(main, parseInt(document.getElementById("difficulty").value));
    }

    function togglePause() {
        if (menu.style.display === "none") {
            isPaused = !isPaused;
            if (isPaused) clearInterval(interval);
            else runGame();
        }
    }

    function createFood() {
        food = {
            x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
            y: Math.floor(Math.random() * (canvas.height / grid)) * grid
        };
        if(snake.some(p => p.x === food.x && p.y === food.y)) createFood();
    }

    function createBonus() {
        bonusFood = {
            x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
            y: Math.floor(Math.random() * (canvas.height / grid)) * grid
        };
        clearTimeout(bonusTimer);
        bonusTimer = setTimeout(() => { bonusFood = null; }, 5000);
    }

    function main() {
        if (isPaused) return;
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};

        if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || 
            snake.some(p => p.x === head.x && p.y === head.y)) {
            gameOver(); return;
        }

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score += 10; foodCount++;
            playFutSound(); createFood();
            if (foodCount % 5 === 0) createBonus();
            scoreText.innerText = score;
        } else if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
            score += 50; playFutSound(); bonusFood = null;
            scoreText.innerText = score;
        } else {
            snake.pop();
        }
        draw();
    }

    function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(0, 255, 204, 0.05)";
        ctx.font = "bold 30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("ZIDAN", canvas.width/2, canvas.height/2);

        ctx.fillStyle = "#ff0055";
        ctx.fillRect(food.x + 2, food.y + 2, grid - 4, grid - 4);

        if (bonusFood) {
            ctx.fillStyle = "#ffcc00";
            ctx.fillRect(bonusFood.x + 1, bonusFood.y + 1, grid - 2, grid - 2);
        }

        snake.forEach((p, i) => {
            ctx.fillStyle = (i === 0) ? "#00ffcc" : "#008866";
            ctx.fillRect(p.x + 1, p.y + 1, grid - 2, grid - 2);
        });
    }

    function setDir(d) {
        if (isPaused) return;
        if (d === 'U' && dy === 0) { dx = 0; dy = -grid; }
        if (d === 'D' && dy === 0) { dx = 0; dy = grid; }
        if (d === 'L' && dx === 0) { dx = -grid; dy = 0; }
        if (d === 'R' && dx === 0) { dx = grid; dy = 0; }
    }

    startBtn.addEventListener('click', startGame);
    startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); });

    const controls = {
        'btn-up': () => setDir('U'),
        'btn-down': () => setDir('D'),
        'btn-left': () => setDir('L'),
        'btn-right': () => setDir('R'),
        'btn-pause': togglePause
    };

    Object.keys(controls).forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); controls[id](); }, {passive: false});
        el.addEventListener('mousedown', (e) => { controls[id](); });
    });

    function gameOver() {
        clearInterval(interval);
        saveScore(score);
        document.getElementById("menu-title").innerHTML = "ጨዋታው አበቃ!<br>ውጤት: " + score;
        menu.style.display = "flex";
    }

    function saveScore(s) {
        let scores = JSON.parse(localStorage.getItem("zidanScores") || "[]");
        scores.push(s);
        scores.sort((a, b) => b - a);
        scores = scores.slice(0, 5);
        localStorage.setItem("zidanScores", JSON.stringify(scores));
        document.getElementById("high-score-top").innerText = scores[0] || 0;
    }

    function showHighScores() {
        const list = document.getElementById("score-list-items");
        const scores = JSON.parse(localStorage.getItem("zidanScores") || "[]");
        list.innerHTML = scores.length ? scores.map((s, i) => `<li>${i+1}. ${s} ነጥብ</li>`).join('') : "ገና አልተመዘገበም";
        document.getElementById("high-scores-screen").style.display = "flex";
    }

    function closeHighScores() { document.getElementById("high-scores-screen").style.display = "none"; }

    const saved = JSON.parse(localStorage.getItem("zidanScores") || "[]");
    document.getElementById("high-score-top").innerText = saved[0] || 0;
</script>
</body>
</html>
